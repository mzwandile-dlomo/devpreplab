name: Backend CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: devpreplab
          POSTGRES_PASSWORD: devpreplab
          POSTGRES_DB: devpreplab
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U devpreplab"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: devpreplab
      POSTGRES_PASSWORD: devpreplab
      POSTGRES_DB: devpreplab
      TEST_DATABASE_URL: postgresql://devpreplab:devpreplab@localhost:5432/test_devpreplab
      ENVIRONMENT: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend tests
        run: |
          make backend-test
